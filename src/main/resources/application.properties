spring.application.name=game
# Render e outros PaaS expõem a porta via PORT
server.port=${PORT:8080}
# Supabase "direto" (db.*.supabase.co:5432) no Render costuma dar java.net.SocketException: Network is unreachable (IPv6).
# Use Transaction pooler (*.pooler.supabase.com, porta 6543). URL aceita jdbc:postgresql://... OU postgresql://... (convertido no startup).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.stczfkstpgkqtdbpgspt.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${SUPABASE_DB_PASSWORD:gamescompleto}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Evita erro em cascata "Unable to determine Dialect" quando a conexão JDBC falha antes do metadata
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.user.seed-email=${APP_USER_EMAIL:eu@local.dev}
app.user.seed-password=${APP_USER_PASSWORD:123456}


springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
